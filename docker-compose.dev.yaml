services:

  vision-dev:
    image: arc-vision:latest
    container_name: arc-vision-dev
    build:
      context: .
      dockerfile: vision/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./vision:/app/vision
      - ./models:/app/models
      - ./data:/app/data
      - results:/app/vision/results
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
  backend-dev:
    image: arc-backend:latest
    container_name: arc-backend-dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - results:/app/vision/results:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-dev:
    container_name: arc-frontend-dev
    build:
      context: ./frontend
      target: deps
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend-dev:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
      - ./frontend/svelte.config.js:/app/svelte.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
    command: ["bun", "run", "dev", "--", "--host", "0.0.0.0"]
    depends_on:
      backend-dev:
        condition: service_healthy
    restart: unless-stopped

  nginx-dev:
    image: nginx:alpine
    container_name: arc-nginx-dev
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend-dev:
        condition: service_started
      backend-dev:
        condition: service_healthy
    restart: unless-stopped

  netdata-dev:
    image: netdata/netdata:latest
    container_name: arc-netdata-dev
    hostname: arc-monitoring-dev
    ports:
      - "19998:19999"
    cap_add:
      - SYS_PTRACE
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  automate-dev:
    container_name: arc-automate-dev
    build:
      context: ./automate
    profiles:
      - tools
    volumes:
      - ./media:/app/media
      - ./data:/app/data:ro
      - ./backend/htmlcov:/app/htmlcov:ro
    environment:
      - FRONTEND_URL=http://nginx-dev:80
      - BACKEND_URL=http://backend-dev:8000
      - MEDIA_DIR=/app/media
      - DATA_DIR=/app/data
      - HTMLCOV_DIR=/app/htmlcov
    depends_on:
      nginx-dev:
        condition: service_started
      backend-dev:
        condition: service_healthy

volumes:
  results:
