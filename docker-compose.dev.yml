services:

  ai-dev:
    image: arc-ai:latest
    container_name: arc-ai-dev
    build:
      context: .
      dockerfile: ai/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ai:/app/ai
      - ./shared:/app/shared
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    
  backend-dev:
    image: arc-backend:latest
    container_name: arc-backend-dev
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  netdata-dev:
    image: netdata/netdata:latest
    container_name: arc-netdata-dev
    hostname: arc-monitoring-dev
    ports:
      - "19998:19999"
    cap_add:
      - SYS_PTRACE
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
