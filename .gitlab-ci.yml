# ECHO Project GitLab CI/CD Pipeline Configuration

stages:
  - lint
  - test
  - build

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

variables:
  # CalVer version — update on each release
  ECHO_VERSION: "26.05.2"

# =================================================
# STAGE 1: LINT - Code formatting and static checks
# =================================================

lint:python:
  stage: lint
  image: python:3.14.5-slim
  variables:
    UV_SYSTEM_PYTHON: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
  script:
    - uvx ruff check --line-length 100 backend/ vision/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ============================
# STAGE 2: TEST - Pytest suite
# ============================

test:backend:
  stage: test
  image: python:3.14.5-slim
  variables:
    UV_SYSTEM_PYTHON: "1"
    CI: "true"
    UV_CACHE_DIR: ".uv-cache"
    UV_LINK_MODE: "symlink"
  cache:
    key:
      files:
        - backend/pyproject.toml
    paths:
      - .uv-cache/
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd backend && uv sync --frozen --group dev && cd ..
  script:
    - cd backend && uv run pytest tests/ -v --cov=app --cov-report=term --cov-report=html --cov-report=xml --cov-report=json
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/htmlcov/
      - backend/coverage.json
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ====================================
# STAGE 3: BUILD - Docker image builds
# ====================================

# Test builds (no push) - runs on MRs to verify Docker builds work
build:backend:test:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -f backend/Dockerfile -t echo-backend:test .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build:frontend:test:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -f frontend/Dockerfile -t echo-frontend:test ./frontend
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# Development builds (with push) - validates full build+push pipeline
# Auto-triggers on merge commits to develop; manual option during MRs targeting develop

build:backend:dev:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin
  script:
    - docker build -f backend/Dockerfile -t echo-backend:dev .
    - docker tag echo-backend:dev $DOCKERHUB_USERNAME/echo-backend:dev
    - docker push $DOCKERHUB_USERNAME/echo-backend:dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_COMMIT_TITLE =~ /^Merge branch/'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: manual

build:frontend:dev:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin
  script:
    - docker build -f frontend/Dockerfile -t echo-frontend:dev ./frontend
    - docker tag echo-frontend:dev $DOCKERHUB_USERNAME/echo-frontend:dev
    - docker push $DOCKERHUB_USERNAME/echo-frontend:dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_COMMIT_TITLE =~ /^Merge branch/'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: manual

# Production builds (with push) - runs on main branch only
# Pushes to Docker Hub with latest + CalVer + commit SHA tags

build:backend:push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin
  script:
    - docker build -f backend/Dockerfile -t echo-backend .
    - docker tag echo-backend $DOCKERHUB_USERNAME/echo-backend:latest
    - docker tag echo-backend $DOCKERHUB_USERNAME/echo-backend:$ECHO_VERSION
    - docker tag echo-backend $DOCKERHUB_USERNAME/echo-backend:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_USERNAME/echo-backend:latest
    - docker push $DOCKERHUB_USERNAME/echo-backend:$ECHO_VERSION
    - docker push $DOCKERHUB_USERNAME/echo-backend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /^Merge branch.*develop.*into main/'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "develop"'
      when: manual

build:frontend:push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin
  script:
    - docker build -f frontend/Dockerfile -t echo-frontend ./frontend
    - docker tag echo-frontend $DOCKERHUB_USERNAME/echo-frontend:latest
    - docker tag echo-frontend $DOCKERHUB_USERNAME/echo-frontend:$ECHO_VERSION
    - docker tag echo-frontend $DOCKERHUB_USERNAME/echo-frontend:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_USERNAME/echo-frontend:latest
    - docker push $DOCKERHUB_USERNAME/echo-frontend:$ECHO_VERSION
    - docker push $DOCKERHUB_USERNAME/echo-frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /^Merge branch.*develop.*into main/'
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "develop"'
      when: manual
