# ARC Project GitLab CI/CD Pipeline Configuration

stages:
  - lint
  - test
  - build

# =================================================
# STAGE 1: LINT - Code formatting and static checks
# =================================================

lint:python:
  stage: lint
  image: python:3.14.2-slim
  variables:
    UV_SYSTEM_PYTHON: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync --frozen --group dev
  script:
    - uv run ruff check backend/ ai/ shared/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ============================
# STAGE 2: TEST - Pytest suite
# ============================

test:backend:
  stage: test
  image: python:3.14.2-slim
  variables:
    UV_SYSTEM_PYTHON: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - cd backend && uv sync --frozen --group dev
  script:
    - cd backend && uv run pytest tests/ -v --cov=backend --cov-report=term --cov-report=html --cov-report=xml --cov-report=json
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/htmlcov/
      - backend/coverage.json
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ====================================
# STAGE 3: BUILD - Docker image builds
# ====================================
build:backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend/Dockerfile -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  after_script:
    - docker images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


build:ai:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f ai/Dockerfile -t $CI_REGISTRY_IMAGE/ai:latest .
    - docker push $CI_REGISTRY_IMAGE/ai:latest
  after_script:
    - docker images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
