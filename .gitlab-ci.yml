# ARC Project GitLab CI/CD Pipeline Configuration

stages:
  - lint
  - test
  - build

# =================================================
# STAGE 1: LINT - Code formatting and static checks
# =================================================

lint:python:
  stage: lint
  image: python:3.14-slim
  before_script:
    - apt-get update && apt-get install -y gcc g++
    - pip install poetry
    - poetry install --only dev
  script:
    - poetry run ruff check backend/ ai/ shared/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ============================
# STAGE 2: TEST - Pytest suite
# ============================

test:backend:
  stage: test
  image: python:3.14-slim
  before_script:
    - apt-get update && apt-get install -y gcc g++
    - pip install poetry
    - cd backend && poetry install
  script:
    - cd backend && poetry run pytest tests/ -v
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'


# ====================================
# STAGE 3: BUILD - Docker image builds
# ====================================
build:backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f backend/Dockerfile -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


build:ai:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f ai/Dockerfile -t $CI_REGISTRY_IMAGE/ai:latest .
    - docker push $CI_REGISTRY_IMAGE/ai:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
