[tool.poetry]
name = "arc-backend"
version = "0.1.0"
description = "Backend for ARC"
authors = ["Vincent Boettcher <vin.br@runbox.no>"]
package-mode = false

[tool.poetry.dependencies]
python = "==3.14.*"
fastapi = "^0.124.4"
uvicorn = "^0.38.0"
jinja2 = "^3.1.6"
pillow = "^12.0.0"
torch = "^2.9.1"
torchvision = "^0.24.1"
python-multipart = "^0.0.20"
polars = "^1.36.1"
duckdb = "^1.4.3"

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.2"
httpx = "^0.28.1"

[tool.pytest.ini_options]
pythonpath = [".."]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
