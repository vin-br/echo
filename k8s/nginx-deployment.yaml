apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-nginx
  namespace: arc
  labels:
    app: arc-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arc-nginx
  template:
    metadata:
      labels:
        app: arc-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: nginx-config
        configMap:
          name: arc-nginx-config
