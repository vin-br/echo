upstream frontend {
    server frontend-dev:5173;
}

server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so upstream IPs are re-resolved after container restarts.
    # Without this, nginx caches the IP at startup and serves 502 if a container restarts.
    resolver 127.0.0.11 valid=5s ipv6=off;

    client_max_body_size 25M;

    proxy_buffering off;

    # Backend API and docs — variable forces re-resolution via the resolver above
    location /api/ {
        set $backend http://backend-dev:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        set $backend http://backend-dev:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $backend http://backend-dev:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /healthz {
        set $backend http://backend-dev:8000;
        proxy_pass $backend;
    }

    # Frontend dev server (everything else) — includes HMR websocket
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
