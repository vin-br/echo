---
- name: Provision ECHO Application (Docker target)
  hosts: all
  become: true
  vars:
    app_dir: /app/backend
    venv_path: "{{ app_dir }}/.venv"
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - curl
        state: present
        update_cache: yes

    - name: Install uv package manager
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: /root/.local/bin/uv

    - name: Remove old venv if exists
      file:
        path: "{{ venv_path }}"
        state: absent

    - name: Create venv with Python 3.14.5
      shell: /root/.local/bin/uv venv {{ venv_path }} --python 3.14.5
      args:
        chdir: "{{ app_dir }}"

    - name: Install app dependencies
      shell: |
        /root/.local/bin/uv pip install --python {{ venv_path }}/bin/python \
          fastapi uvicorn pillow torch torchvision \
          python-multipart polars duckdb
      args:
        chdir: "{{ app_dir }}"

    - name: Create systemd-compatible startup script
      copy:
        dest: /app/start.sh
        mode: "0755"
        content: |
          #!/bin/bash
          cd {{ app_dir }}
          PYTHONPATH=/app exec {{ venv_path }}/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

    - name: Start backend in background
      shell: nohup /app/start.sh > /var/log/echo-backend.log 2>&1 &
      async: 10
      poll: 0

    - name: Wait for backend to initialize (model loading)
      pause:
        seconds: 60

    - name: Wait for health endpoint
      uri:
        url: http://localhost:8000/healthz
        status_code: 200
      register: health_check
      retries: 30
      delay: 10
      until: health_check.status == 200

    - name: Display final status
      debug:
        msg: "Backend running inside container! Access at http://localhost:8000"
