---
- name: Provision ARC Application
  hosts: all
  become: true
  vars:
    app_dir: /vagrant_data/backend
    venv_path: "{{ app_dir }}/.venv"
    ansible_python_interpreter: /usr/bin/python3
    
  tasks:
    - name: Install system dependencies
      dnf:
        name:
          - python3
          - python3-pip
          - curl
        state: present
        update_cache: yes

    - name: Install uv package manager
      shell: curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: /root/.local/bin/uv

    - name: Remove old venv if exists
      file:
        path: "{{ venv_path }}"
        state: absent

    - name: Create venv with Python 3.14.2
      shell: /root/.local/bin/uv venv {{ venv_path }} --python 3.14.2
      args:
        chdir: "{{ app_dir }}"
        
    - name: Install app dependencies
      shell: |
        /root/.local/bin/uv pip install --python {{ venv_path }}/bin/python \
          fastapi uvicorn jinja2 pillow torch torchvision \
          python-multipart polars duckdb
      args:
        chdir: "{{ app_dir }}"
        
    - name: Create systemd service file
      copy:
        dest: /etc/systemd/system/arc-backend.service
        content: |
          [Unit]
          Description=ARC Backend Application
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory={{ app_dir }}
          Environment="PYTHONPATH=/vagrant_data"
          ExecStart={{ venv_path }}/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          Restart=on-failure
          RestartSec=5s
          
          [Install]
          WantedBy=multi-user.target
      notify: restart arc-backend
      
    - name: Start arc-backend service
      systemd:
        name: arc-backend
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for backend to initialize (model loading)
      pause:
        seconds: 60

    - name: Wait for health endpoint
      uri:
        url: http://localhost:8000/healthz
        status_code: 200
      register: health_check
      retries: 30
      delay: 10
      until: health_check.status == 200

    - name: Display final status
      debug:
        msg: "Backend running! Access at http://localhost:8080 from host"
        
  handlers:
    - name: restart arc-backend
      systemd:
        name: arc-backend
        state: restarted
